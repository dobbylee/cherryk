services:
  postgres:
    image: postgres:18
    container_name: cherryk-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: cherryk
      POSTGRES_USER: cherryk
      POSTGRES_PASSWORD: cherryk
    ports:
      - "5433:5432"
    volumes:
      - postgres18_data:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U cherryk -d cherryk"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  postgres18_data:
